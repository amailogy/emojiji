<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>emojiji - 絵文字×時事</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f4f1eb;--ink:#1a1a1a;--red:#c0392b;--border:#e2ddd4;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{
  height:100%;width:100%;overflow:hidden;
  font-family:'Zen Kaku Gothic New',sans-serif;
  background:var(--bg);color:var(--ink);
  position:fixed;top:0;left:0;right:0;bottom:0;
  -webkit-text-size-adjust:100%;
  -webkit-tap-highlight-color:transparent;
}
input,button,textarea{font-family:inherit;font-size:16px}

#app{
  display:flex;flex-direction:column;
  height:100%;width:100%;
  padding-bottom:var(--safe-bottom);
}

/* ── Header ── */
#header{
  display:flex;align-items:baseline;gap:8px;
  padding:10px 16px 8px;
  border-bottom:3px double var(--ink);
  flex-shrink:0;
}
#header .logo{
  font-family:'Shippori Mincho',serif;font-weight:800;
  font-size:22px;letter-spacing:-1px;
}
#header .sub{font-size:11px;color:#888;white-space:nowrap}
#header .day{
  margin-left:auto;font-size:11px;font-weight:700;
  white-space:nowrap;letter-spacing:1px;
}

/* ── Topic ── */
#topic-area{
  padding:10px 16px;flex-shrink:0;
  border-bottom:1px solid var(--border);
}
#topic-label{font-size:10px;letter-spacing:2px;color:#888;text-transform:uppercase}
#topic-word{
  font-family:'Shippori Mincho',serif;font-weight:800;
  font-size:28px;color:var(--red);margin-top:2px;
}

/* ── Hints ── */
#hints-row{
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;flex-shrink:0;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  border-bottom:1px solid var(--border);
}
#hints-row::-webkit-scrollbar{display:none}
.hint-btn{
  flex-shrink:0;width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;border:2px solid var(--border);
  background:#fff;cursor:pointer;border-radius:0;
  transition:border-color .15s;
}
.hint-btn.selected{border-color:var(--red);background:#fff5f5}
.hint-btn.more{
  font-size:12px;font-weight:700;color:#888;
  border-radius:6px;min-width:38px;
}

/* ── Canvas ── */
#canvas-wrap{
  flex:1;min-height:0;padding:8px 16px;
  display:flex;flex-direction:column;
}
#canvas{
  flex:1;position:relative;
  background:#fff;border:2px solid var(--ink);
  box-shadow:4px 4px 0 rgba(0,0,0,.1);
  overflow:hidden;touch-action:none;
}
#canvas .placeholder{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:13px;color:#bbb;pointer-events:none;
  text-align:center;line-height:1.6;
}
.emoji-item{
  position:absolute;cursor:grab;user-select:none;
  -webkit-user-select:none;
  transition:transform .1s,opacity .1s;
  will-change:transform;
  line-height:1;
}
.emoji-item.dragging{cursor:grabbing;z-index:1000}
.emoji-item.over-trash{opacity:.4;transform:scale(.7)}
.emoji-item.selected-emoji{filter:drop-shadow(0 0 3px var(--red))}
.emoji-item.poof{
  animation:poof .3s ease-out forwards;
}
@keyframes poof{
  0%{transform:scale(1);opacity:1}
  100%{transform:scale(0);opacity:0}
}

/* ── Trash ── */
#trash-zone{
  position:absolute;bottom:0;left:0;right:0;
  height:70px;
  display:flex;align-items:center;justify-content:center;
  font-size:32px;
  background:linear-gradient(transparent,rgba(192,57,43,.1));
  transform:translateY(100%);
  transition:transform .2s,background .15s;
  z-index:999;pointer-events:none;
}
#trash-zone.visible{transform:translateY(0)}
#trash-zone.active{background:linear-gradient(transparent,rgba(192,57,43,.35))}

/* ── Toolbar ── */
#toolbar{
  display:flex;align-items:center;gap:8px;
  padding:8px 16px 10px;flex-shrink:0;
  border-top:1px solid var(--border);
}
#current-emoji{
  width:40px;height:40px;font-size:28px;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--ink);background:#fff;flex-shrink:0;
}
.tb-btn{
  height:36px;padding:0 12px;
  border:2px solid var(--ink);background:#fff;
  font-size:12px;font-weight:700;cursor:pointer;
  white-space:nowrap;
}
.tb-btn.share{background:var(--ink);color:#fff}
.tb-btn.share:active{background:var(--red)}
#toolbar .spacer{flex:1}
#emoji-input{
  position:absolute;opacity:0;width:1px;height:1px;
  top:-100px;left:-100px;pointer-events:none;
}

/* ── Overlay ── */
#overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.7);z-index:2000;
  display:none;align-items:center;justify-content:center;
  padding:20px;
}
#overlay.visible{display:flex}
#overlay-box{
  background:var(--bg);border:3px solid var(--ink);
  width:100%;max-width:380px;max-height:90vh;
  overflow-y:auto;padding:24px 20px;
}
#overlay-box h2{
  font-family:'Shippori Mincho',serif;font-weight:800;
  font-size:20px;margin-bottom:4px;
}
#overlay-box .desc{font-size:13px;color:#666;margin-bottom:16px;line-height:1.5}
#share-preview{
  background:#fff;border:2px solid var(--ink);
  padding:12px;font-size:15px;line-height:1.4;
  white-space:pre-wrap;word-break:break-all;
  font-family:monospace;
  margin-bottom:16px;
}
#overlay-box .btn-row{display:flex;flex-direction:column;gap:8px}
#overlay-box .btn-row button{
  width:100%;height:44px;
  border:2px solid var(--ink);
  font-size:14px;font-weight:700;cursor:pointer;
}
.btn-x{background:var(--ink);color:#fff}
.btn-copy{background:#fff;color:var(--ink)}
.btn-close{background:var(--bg);color:var(--ink)}

/* ── Done / Error Screen ── */
#done-screen,#error-screen{
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  flex:1;padding:32px;text-align:center;
}
#done-screen.visible,#error-screen.visible{display:flex}
#done-screen h2,#error-screen h2{
  font-family:'Shippori Mincho',serif;font-size:22px;
  font-weight:800;margin-bottom:8px;
}
#done-screen .past-share{
  background:#fff;border:2px solid var(--ink);
  padding:12px;font-size:14px;white-space:pre-wrap;
  word-break:break-all;
  font-family:monospace;margin-top:16px;max-width:90%;
  width:100%;text-align:left;box-sizing:border-box;
}
#error-screen p{font-size:14px;color:#888;margin-top:4px}

/* ── Active area hide ── */
#game-area{display:flex;flex-direction:column;flex:1;min-height:0}
#game-area.hidden{display:none}
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div id="header">
    <span class="logo">emojiji</span>
    <span class="sub">絵文字×時事</span>
    <span class="day" id="day-num"></span>
  </div>

  <!-- Error Screen -->
  <div id="error-screen">
    <h2 id="error-title">今日のお題はまだありません</h2>
    <p id="error-msg">明日をお楽しみに！</p>
  </div>

  <!-- Done Screen -->
  <div id="done-screen">
    <h2>今日はもう回答済みです</h2>
    <p style="font-size:13px;color:#888">また明日チャレンジしてね</p>
    <div class="past-share" id="past-share"></div>
  </div>

  <!-- Game Area -->
  <div id="game-area" class="hidden">
    <div id="topic-area">
      <div id="topic-label">本日のお題</div>
      <div id="topic-word"></div>
    </div>

    <div id="hints-row"></div>

    <div id="canvas-wrap">
      <div id="canvas">
        <div class="placeholder" id="canvas-hint">タップして絵文字を配置</div>
        <div id="trash-zone">🗑️</div>
      </div>
    </div>

    <div id="toolbar">
      <div id="current-emoji"></div>
      <button class="tb-btn" id="btn-other">他の絵文字</button>
      <span class="spacer"></span>
      <button class="tb-btn" id="btn-clear">全消し</button>
      <button class="tb-btn share" id="btn-share">共有</button>
    </div>
  </div>

  <input type="text" id="emoji-input" autocomplete="off">
</div>

<!-- Overlay -->
<div id="overlay">
  <div id="overlay-box">
    <h2 id="overlay-word"></h2>
    <div class="desc" id="overlay-desc"></div>
    <div id="share-preview"></div>
    <div class="btn-row">
      <button class="btn-x" id="btn-tweet">𝕏 に投稿する</button>
      <button class="btn-copy" id="btn-copy-text">テキストをコピー</button>
      <button class="btn-close" id="btn-close-overlay">閉じる</button>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';

  // ── Constants ──
  const DAY_ONE = new Date('2026-03-02T00:00:00+09:00');
  const GRID = 5;
  const MIN_SIZE = 24;
  const MAX_SIZE = 80;
  const DEFAULT_SIZE = 40;
  const TRASH_HEIGHT = 70;
  const SITE_URL = 'https://amailogy.github.io/emojiji';

  // ── State ──
  let todayKey = '';
  let topic = null;
  let selectedEmoji = '';
  let emojiItems = [];
  let selectedItem = null;
  let dragState = null;
  let pinchState = null;

  // ── Elements ──
  const $ = id => document.getElementById(id);
  const app = $('app');
  const dayNum = $('day-num');
  const errorScreen = $('error-screen');
  const errorTitle = $('error-title');
  const errorMsg = $('error-msg');
  const doneScreen = $('done-screen');
  const pastShare = $('past-share');
  const gameArea = $('game-area');
  const topicWord = $('topic-word');
  const hintsRow = $('hints-row');
  const canvas = $('canvas');
  const canvasHint = $('canvas-hint');
  const trashZone = $('trash-zone');
  const currentEmojiEl = $('current-emoji');
  const btnOther = $('btn-other');
  const btnClear = $('btn-clear');
  const btnShare = $('btn-share');
  const emojiInput = $('emoji-input');
  const overlay = $('overlay');
  const overlayWord = $('overlay-word');
  const overlayDesc = $('overlay-desc');
  const sharePreview = $('share-preview');
  const btnTweet = $('btn-tweet');
  const btnCopyText = $('btn-copy-text');
  const btnCloseOverlay = $('btn-close-overlay');

  // ── Utility ──
  function getTodayJST() {
    const now = new Date();
    const jst = new Date(now.getTime() + (9 * 60 - now.getTimezoneOffset()) * 60000);
    return jst.toISOString().slice(0, 10);
  }

  function getDayNumber(dateStr) {
    const d = new Date(dateStr + 'T00:00:00+09:00');
    const diff = Math.floor((d - DAY_ONE) / 86400000);
    return diff + 1;
  }

  function isEmoji(str) {
    return /\p{Emoji_Presentation}|\p{Extended_Pictographic}/u.test(str);
  }

  function extractEmojis(text) {
    if (!Intl.Segmenter) return [...text].filter(isEmoji);
    const seg = new Intl.Segmenter('ja', { granularity: 'grapheme' });
    return [...seg.segment(text)].map(s => s.segment).filter(isEmoji);
  }

  function storageKey(dateStr) {
    return 'emojiji-' + dateStr;
  }

  // ── Init ──
  async function init() {
    todayKey = getTodayJST();
    dayNum.textContent = todayKey.replace(/-/g, '/');

    // Check if already done
    const saved = localStorage.getItem(storageKey(todayKey));
    if (saved) {
      showDone(saved);
      return;
    }

    // Fetch topics
    try {
      const res = await fetch('./topics.json?t=' + Date.now());
      if (!res.ok) throw new Error('fetch failed');
      const data = await res.json();
      topic = data[todayKey];
    } catch (e) {
      showError('お題の読み込みに失敗しました', 'ページを再読み込みしてください');
      return;
    }

    if (!topic) {
      showError('今日のお題はまだありません', '明日をお楽しみに！');
      return;
    }

    startGame();
  }

  function showError(title, msg) {
    errorTitle.textContent = title;
    errorMsg.textContent = msg;
    errorScreen.classList.add('visible');
    gameArea.classList.add('hidden');
    doneScreen.classList.remove('visible');
  }

  function showDone(shareText) {
    doneScreen.classList.add('visible');
    pastShare.textContent = shareText;
    gameArea.classList.add('hidden');
    errorScreen.classList.remove('visible');
  }

  function startGame() {
    gameArea.classList.remove('hidden');
    errorScreen.classList.remove('visible');
    doneScreen.classList.remove('visible');

    topicWord.textContent = topic.word;
    buildHints();

    // Select first hint
    if (topic.hints.length > 0) {
      selectEmoji(topic.hints[0]);
    }

    setupCanvas();
    setupToolbar();
    setupEmojiInput();
  }

  // ── Hints ──
  function buildHints() {
    hintsRow.innerHTML = '';
    topic.hints.forEach(emoji => {
      const btn = document.createElement('button');
      btn.className = 'hint-btn';
      btn.textContent = emoji;
      btn.addEventListener('click', () => selectEmoji(emoji));
      hintsRow.appendChild(btn);
    });
    const more = document.createElement('button');
    more.className = 'hint-btn more';
    more.textContent = '他…';
    more.addEventListener('click', openEmojiKeyboard);
    hintsRow.appendChild(more);
  }

  function selectEmoji(emoji) {
    selectedEmoji = emoji;
    currentEmojiEl.textContent = emoji;
    hintsRow.querySelectorAll('.hint-btn').forEach(b => {
      b.classList.toggle('selected', b.textContent === emoji && !b.classList.contains('more'));
    });
    deselectItem();
  }

  // ── Emoji Input ──
  function setupEmojiInput() {
    emojiInput.addEventListener('input', () => {
      const emojis = extractEmojis(emojiInput.value);
      if (emojis.length > 0) {
        selectEmoji(emojis[emojis.length - 1]);
      }
      emojiInput.value = '';
    });
  }

  function openEmojiKeyboard() {
    emojiInput.focus();
    emojiInput.click();
  }

  // ── Canvas ──
  function setupCanvas() {
    canvas.addEventListener('touchstart', onCanvasTouchStart, { passive: false });
    canvas.addEventListener('touchmove', onCanvasTouchMove, { passive: false });
    canvas.addEventListener('touchend', onCanvasTouchEnd, { passive: false });
    canvas.addEventListener('mousedown', onCanvasMouseDown);
  }

  function updateHint() {
    canvasHint.style.display = emojiItems.length === 0 ? '' : 'none';
  }

  function placeEmoji(x, y) {
    if (!selectedEmoji) return;
    const item = {
      emoji: selectedEmoji,
      size: DEFAULT_SIZE,
      el: null
    };
    const el = document.createElement('div');
    el.className = 'emoji-item';
    el.style.fontSize = item.size + 'px';
    el.textContent = item.emoji;
    canvas.appendChild(el);
    item.el = el;

    const rect = canvas.getBoundingClientRect();
    const ex = x - rect.left - item.size / 2;
    const ey = y - rect.top - item.size / 2;
    el.style.left = Math.max(0, Math.min(ex, rect.width - item.size)) + 'px';
    el.style.top = Math.max(0, Math.min(ey, rect.height - item.size)) + 'px';

    emojiItems.push(item);
    updateHint();
    selectItem(item);
  }

  function selectItem(item) {
    deselectItem();
    selectedItem = item;
    item.el.classList.add('selected-emoji');
  }

  function deselectItem() {
    if (selectedItem) {
      selectedItem.el.classList.remove('selected-emoji');
      selectedItem = null;
    }
  }

  function removeItem(item) {
    item.el.classList.add('poof');
    item.el.addEventListener('animationend', () => {
      item.el.remove();
      emojiItems = emojiItems.filter(i => i !== item);
      updateHint();
    });
    if (selectedItem === item) deselectItem();
  }

  function getItemAt(x, y) {
    for (let i = emojiItems.length - 1; i >= 0; i--) {
      const r = emojiItems[i].el.getBoundingClientRect();
      if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) {
        return emojiItems[i];
      }
    }
    return null;
  }

  // ── Touch handling ──
  function onCanvasTouchStart(e) {
    if (e.touches.length === 2 && selectedItem) {
      e.preventDefault();
      pinchState = {
        item: selectedItem,
        dist: getTouchDist(e),
        origSize: selectedItem.size
      };
      return;
    }

    if (e.touches.length !== 1) return;
    e.preventDefault();

    const t = e.touches[0];
    const hit = getItemAt(t.clientX, t.clientY);

    if (hit) {
      const rect = hit.el.getBoundingClientRect();
      dragState = {
        item: hit,
        offsetX: t.clientX - rect.left,
        offsetY: t.clientY - rect.top,
        startX: t.clientX,
        startY: t.clientY,
        moved: false
      };
      hit.el.classList.add('dragging');
      selectItem(hit);
    } else {
      deselectItem();
      placeEmoji(t.clientX, t.clientY);
    }
  }

  function onCanvasTouchMove(e) {
    if (pinchState && e.touches.length === 2) {
      e.preventDefault();
      const dist = getTouchDist(e);
      const scale = dist / pinchState.dist;
      const newSize = Math.round(pinchState.origSize * scale);
      pinchState.item.size = Math.max(MIN_SIZE, Math.min(MAX_SIZE, newSize));
      pinchState.item.el.style.fontSize = pinchState.item.size + 'px';
      return;
    }

    if (!dragState || e.touches.length !== 1) return;
    e.preventDefault();

    const t = e.touches[0];
    const dx = t.clientX - dragState.startX;
    const dy = t.clientY - dragState.startY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragState.moved = true;

    if (!dragState.moved) return;

    const cRect = canvas.getBoundingClientRect();
    const nx = t.clientX - cRect.left - dragState.offsetX;
    const ny = t.clientY - cRect.top - dragState.offsetY;
    dragState.item.el.style.left = Math.max(0, Math.min(nx, cRect.width - dragState.item.size)) + 'px';
    dragState.item.el.style.top = Math.max(0, Math.min(ny, cRect.height - dragState.item.size)) + 'px';

    // Trash detection
    const bottomDist = cRect.bottom - t.clientY;
    if (bottomDist < TRASH_HEIGHT) {
      trashZone.classList.add('visible', 'active');
      dragState.item.el.classList.add('over-trash');
    } else {
      trashZone.classList.remove('active');
      trashZone.classList.add('visible');
      dragState.item.el.classList.remove('over-trash');
      if (bottomDist > TRASH_HEIGHT + 30) {
        trashZone.classList.remove('visible');
      }
    }
  }

  function onCanvasTouchEnd(e) {
    if (pinchState) {
      if (e.touches.length < 2) {
        pinchState = null;
      }
      return;
    }

    if (!dragState) return;

    const item = dragState.item;
    item.el.classList.remove('dragging');

    if (dragState.moved && trashZone.classList.contains('active')) {
      removeItem(item);
    } else if (!dragState.moved) {
      selectItem(item);
    }

    trashZone.classList.remove('visible', 'active');
    item.el.classList.remove('over-trash');
    dragState = null;
  }

  function getTouchDist(e) {
    const a = e.touches[0];
    const b = e.touches[1];
    return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
  }

  // ── Mouse fallback ──
  function onCanvasMouseDown(e) {
    const hit = getItemAt(e.clientX, e.clientY);
    if (hit) {
      selectItem(hit);
      let moved = false;
      const rect = hit.el.getBoundingClientRect();
      const ox = e.clientX - rect.left;
      const oy = e.clientY - rect.top;

      const onMove = (ev) => {
        moved = true;
        const cRect = canvas.getBoundingClientRect();
        hit.el.style.left = Math.max(0, Math.min(ev.clientX - cRect.left - ox, cRect.width - hit.size)) + 'px';
        hit.el.style.top = Math.max(0, Math.min(ev.clientY - cRect.top - oy, cRect.height - hit.size)) + 'px';

        const bottomDist = cRect.bottom - ev.clientY;
        if (bottomDist < TRASH_HEIGHT) {
          trashZone.classList.add('visible', 'active');
          hit.el.classList.add('over-trash');
        } else {
          trashZone.classList.remove('active');
          hit.el.classList.remove('over-trash');
          if (bottomDist > TRASH_HEIGHT + 30) trashZone.classList.remove('visible');
          else trashZone.classList.add('visible');
        }
      };

      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        if (moved && trashZone.classList.contains('active')) {
          removeItem(hit);
        } else if (!moved) {
          selectItem(hit);
        }
        trashZone.classList.remove('visible', 'active');
        hit.el.classList.remove('over-trash');
      };

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    } else {
      deselectItem();
      placeEmoji(e.clientX, e.clientY);
    }
  }

  // ── Toolbar ──
  function setupToolbar() {
    btnOther.addEventListener('click', openEmojiKeyboard);
    btnClear.addEventListener('click', () => {
      emojiItems.forEach(item => item.el.remove());
      emojiItems = [];
      deselectItem();
      updateHint();
    });
    btnShare.addEventListener('click', share);
  }

  // ── Share ──
  function share() {
    if (emojiItems.length === 0) return;

    const cRect = canvas.getBoundingClientRect();
    const cw = cRect.width;
    const ch = cRect.height;

    // Map emojis to grid cells
    const grid = Array.from({ length: GRID }, () => Array(GRID).fill(null));

    emojiItems.forEach(item => {
      const left = parseInt(item.el.style.left) || 0;
      const top = parseInt(item.el.style.top) || 0;
      const cx = left + item.size / 2;
      const cy = top + item.size / 2;
      const col = Math.min(GRID - 1, Math.max(0, Math.floor(cx / cw * GRID)));
      const row = Math.min(GRID - 1, Math.max(0, Math.floor(cy / ch * GRID)));
      // Later placement wins
      grid[row][col] = item.emoji;
    });

    // Bounding box crop
    let rMin = GRID, rMax = -1, cMin = GRID, cMax = -1;
    for (let r = 0; r < GRID; r++) {
      for (let c = 0; c < GRID; c++) {
        if (grid[r][c]) {
          rMin = Math.min(rMin, r); rMax = Math.max(rMax, r);
          cMin = Math.min(cMin, c); cMax = Math.max(cMax, c);
        }
      }
    }

    if (rMax < 0) return; // no emojis

    const lines = [];
    for (let r = rMin; r <= rMax; r++) {
      let line = '';
      for (let c = cMin; c <= cMax; c++) {
        line += grid[r][c] || '\u2800';
      }
      lines.push(line);
    }

    const dateStr = todayKey.slice(5).replace('-', '/');
    const artText = lines.join('\n');
    const shareText = dateStr + '\n' + artText + '\n\n' + SITE_URL + ' #emojiji';

    // Save to localStorage
    localStorage.setItem(storageKey(todayKey), shareText);

    // Show overlay
    overlayWord.textContent = topic.word;
    overlayDesc.textContent = topic.desc;
    sharePreview.textContent = shareText;
    overlay.classList.add('visible');

    btnTweet.onclick = () => {
      const url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText);
      window.open(url, '_blank');
    };

    btnCopyText.onclick = () => {
      navigator.clipboard.writeText(shareText).then(() => {
        btnCopyText.textContent = 'コピーしました！';
        setTimeout(() => { btnCopyText.textContent = 'テキストをコピー'; }, 2000);
      });
    };

    btnCloseOverlay.onclick = () => {
      overlay.classList.remove('visible');
      showDone(shareText);
    };
  }

  // ── Start ──
  init();
})();
</script>
</body>
</html>
